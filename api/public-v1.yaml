openapi: 3.1.0
info:
  title: APP13 Public API
  version: 1.1.0
  description: |-
    APP13 Professional Operating System — MVP public REST surface (v1.1).

    Constitutional chain: Action → Contract → Execution → Trust → Complaint.

    **v1.1 highlights:**
    - Mandatory `Idempotency-Key` on all POST create/transition (P0-S5)
    - DB revalidation of tier/roles on gated mutations (P0-S1)
    - Upload-intent tenancy binding (P0-S4)
    - Dimension-scoped TEKRR routes (P0-A1)
    - Trust read-only; no score writes (ADR-003)
    - Admin-only adjudication (P0-CM1)

    Forbidden routes: marketplace, payments, direct trust score writes.

    Aligns with API Architecture v1.1 and PostgreSQL Schema v1.1.
  license:
    name: Proprietary
  contact:
    name: APP13 Platform Engineering
servers:
- url: https://api.app13.example/v1
  description: Production
- url: https://api.staging.app13.example/v1
  description: Staging
tags:
- name: Auth
  description: Registration, login, session, token refresh
- name: Identity
  description: Profiles, /me, customers, providers
- name: Verification
  description: T1/T2 identity verification and credentials
- name: Actions
  description: Action lifecycle and TEKRR decomposition (ADR-001)
- name: Contracts
  description: Contract generation, acceptance, lifecycle
- name: Execution
  description: Milestones and attestations (CA-2 gates)
- name: Evidence
  description: Tenancy-bound evidence upload (P0-S4)
- name: Trust
  description: Provider trust profiles — read-only (ADR-003)
- name: Cases
  description: Dispute file containers
- name: Issues
  description: Informal pre-formal execution flags
- name: Complaints
  description: Formal disputes (ADR-002)
- name: Operations
  description: Async operation polling
- name: Admin
  description: Platform operator endpoints
