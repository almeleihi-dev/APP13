components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    sessionCookie:
      type: apiKey
      in: cookie
      name: app13_session
    kycWebhookSignature:
      type: apiKey
      in: header
      name: X-KYC-Signature
      description: HMAC signature from KYC provider for webhook verification
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: UUID v4; required on all POST create/transition (P0-S5)
      schema:
        type: string
        format: uuid
    RequestId:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
    PageSize:
      name: page[size]
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    PageCursor:
      name: page[cursor]
      in: query
      schema:
        type: string
    ActionId:
      name: actionId
      in: path
      required: true
      schema: &18
        type: string
        format: uuid
    ContractId:
      name: contractId
      in: path
      required: true
      schema: *18
    MilestoneId:
      name: milestoneId
      in: path
      required: true
      schema: *18
    AttestationId:
      name: attestationId
      in: path
      required: true
      schema: *18
    EvidenceId:
      name: evidenceId
      in: path
      required: true
      schema: *18
    ProviderId:
      name: providerId
      in: path
      required: true
      schema: *18
    CustomerId:
      name: customerId
      in: path
      required: true
      schema: *18
    ComplaintId:
      name: complaintId
      in: path
      required: true
      schema: *18
    CaseId:
      name: caseId
      in: path
      required: true
      schema: *18
    IssueId:
      name: issueId
      in: path
      required: true
      schema: *18
    CredentialId:
      name: credentialId
      in: path
      required: true
      schema: *18
    OperationId:
      name: operationId
      in: path
      required: true
      schema: *18
    TekrrDimension:
      name: dimension
      in: path
      required: true
      schema:
        "$ref": "#/components/schemas/TekrrDimension"
    ActionTypeCode:
      name: code
      in: path
      required: true
      schema:
        type: string
    SnapshotId:
      name: snapshotId
      in: path
      required: true
      schema: *18
    ProposalId:
      name: proposalId
      in: path
      required: true
      schema: *18
    VerificationId:
      name: verificationId
      in: path
      required: true
      schema: *18
    AppealId:
      name: appealId
      in: path
      required: true
      schema: *18
    UserId:
      name: userId
      in: path
      required: true
      schema: *18
  responses:
    Forbidden:
      description: Forbidden
      content:
        application/problem+json:
          schema:
            "$ref": "#/components/schemas/Problem"
    NotFound:
      description: Not found (IDOR-safe)
      content:
        application/problem+json:
          schema:
            "$ref": "#/components/schemas/Problem"
    InvalidTransition:
      description: Invalid state transition
      content:
        application/problem+json:
          schema:
            "$ref": "#/components/schemas/Problem"
    EligibilityError:
      description: Eligibility gate failed
      content:
        application/problem+json:
          schema:
            "$ref": "#/components/schemas/EligibilityError"
  schemas:
    AccountStatus:
      type: string
      enum:
      - active
      - suspended
      - deactivated
    VerificationTier:
      type: string
      enum:
      - T0
      - T1
      - T2
      - T3
      - T4
    PlatformRole:
      type: string
      enum:
      - customer
      - provider
      - verification_analyst
      - complaint_adjudicator
      - trust_ops
      - platform_admin
      - super_admin
    VerificationStatus:
      type: string
      enum:
      - pending
      - submitted
      - under_review
      - approved
      - rejected
      - expired
    CredentialStatus:
      type: string
      enum:
      - pending
      - verified
      - expired
      - revoked
    ActionStatus:
      type: string
      enum:
      - draft
      - tekrr_in_progress
      - ready_for_contract
      - contract_pending
      - contract_active
      - completed
      - cancelled
    ContractStatus:
      type: string
      enum:
      - draft
      - proposed
      - accepted
      - active
      - completed
      - issue_raised
      - disputed
      - resolved
      - closed
      - void
      - cancelled
    PartyRole:
      type: string
      enum:
      - customer
      - provider
    MilestoneStatus:
      type: string
      enum:
      - pending
      - in_progress
      - submitted
      - accepted
      - disputed
      - frozen
      - waived
    EvidenceType:
      type: string
      enum:
      - EV-TS
      - EV-PHOTO
      - EV-DOC
      - EV-CHECK
      - EV-TEST
      - EV-SIGN
      - EV-CRED
      - EV-NOTE
    TekrrDimension:
      type: string
      enum:
      - T
      - E
      - K
      - R
      - S
    FulfillmentRating:
      type: string
      enum:
      - FUL
      - SUF
      - PAR
      - UNF
      - PEN
    ResponsibleParty:
      type: string
      enum:
      - customer
      - provider
      - system
      - both
    CaseStatus:
      type: string
      enum:
      - open
      - informal
      - formal
      - pending_closure
      - closed
      - withdrawn
    IssueStatus:
      type: string
      enum:
      - raised
      - acknowledged
      - in_discussion
      - escalated
      - resolved_informally
      - withdrawn
      - expired
    ComplaintStatus:
      type: string
      enum:
      - filed
      - triage_pending
      - dismissed
      - evidence_gathering
      - mediation
      - adjudication_pending
      - resolved_mutual
      - resolved_upheld
      - resolved_dismissed
      - resolved_shared
      - escalated_external
      - pending_external
      - closed
    ComplaintType:
      type: string
      enum:
      - TIME_BREACH
      - EFFORT_DEFICIENCY
      - KNOWLEDGE_MISREP
      - RISK_INCIDENT
      - RESPONSIBILITY_FAILURE
      - CONTRACT_INTEGRITY
    ComplaintOutcome:
      type: string
      enum:
      - upheld_provider_fault
      - upheld_customer_fault
      - dismissed
      - shared_fault
      - resolved_mutual
      - external_referral
    ComplaintSeverity:
      type: string
      enum:
      - low
      - medium
      - high
      - critical
    DismissedReasonCode:
      type: string
