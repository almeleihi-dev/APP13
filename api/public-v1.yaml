      - OUT_OF_WINDOW
      - NOT_A_PARTY
      - INVALID_DIMENSION
      - DUPLICATE_ACTIVE
      - CONTRACT_NOT_ACTIVE
      - INSUFFICIENT_DETAIL
      - TYPE_MISMATCH
    ConfidenceBand:
      type: string
      enum:
      - low
      - medium
      - high
    TrustRecordState:
      type: string
      enum:
