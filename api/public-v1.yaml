      - provisional
      - active
      - dispute_hold
      - frozen
      - archived
    Problem:
      type: object
      required:
      - type
      - title
      - status
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        code:
          type: string
        engine:
          type: string
        request_id:
          type: string
    EligibilityError:
      allOf:
      - "$ref": "#/components/schemas/Problem"
      - type: object
        properties:
          dismissed_reason_code:
            "$ref": "#/components/schemas/DismissedReasonCode"
    PaginationMeta:
      type: object
      properties:
        page:
          type: object
          properties:
            size:
              type: integer
            has_more:
              type: boolean
            next_cursor:
              type:
              - string
              - 'null'
    TransitionRequest:
      type: object
      required:
      - transition
      - idempotency_key
      properties:
        transition:
          type: string
        reason:
          type: string
          maxLength: 2000
        idempotency_key: *18
    ContractTransitionRequest:
      type: object
      required:
      - transition
      - idempotency_key
      properties:
        transition:
          type: string
          enum:
          - propose
          - accept
          - decline
          - cancel
        party_role:
          "$ref": "#/components/schemas/PartyRole"
        document_hash_ack:
          type: string
          description: Required on accept (CL-5)
          pattern: "^sha256:"
        reason:
          type: string
          maxLength: 2000
        idempotency_key: *18
    AsyncOperationResponse:
      type: object
      required:
      - id
      - status
      properties:
        id: *18
        status:
          type: string
          enum:
          - queued
          - in_progress
          - completed
          - failed
        resource_type:
          type: string
        resource_id: *18
        completed_at: &19
          type: string
          format: date-time
        error:
          type:
          - string
          - 'null'
    RegisterCustomerRequest:
      type: object
      required:
      - email
      - password
      - display_name
